<html>

<head>
    <style>
        .btn-1 {
            background-color: rgb(243, 170, 207);
            border: solid;
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 4px 4px 4px gray;
            transition: 2s;
        }

        .btn-1:hover {
            background-color: rgb(230, 100, 219);
        }

        .btn-2 {

            border-radius: 20px 0px 20px 0px;

            box-shadow: 2px 2px 2px grey;
        }

        .btn-2:hover {
            background-color: rgb(150, 230, 100);
        }

        .btn-3 {
            background-color: rgb(179, 229, 252);
            border: double;
            padding: 10px 20px;
            border-radius: 0px 20px 0px 20px;
            cursor: pointer;

        }

        .btn-3:hover {
            background-color: rgb(150, 230, 100);
        }

        .btn-4 {
            background-color: rgb(255, 223, 179);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-4:hover {

        }

            background-color: rgb(179, 214, 255);
            border: none;
            padding: 10px 20px;

            cursor: pointer;
            box-shadow: 2px 2px 2px grey;
        }

        .btn-5:hover {

        }

        .btn-6 {
            background-color: rgb(247, 255, 179);
            border: solid;
            padding: 10px 20px;
            border-radius: 1px;
            cursor: pointer;
            box-shadow: 2px 2px 2px grey;
        }

        .btn-6:hover {
            background-color: rgb(230, 159, 100);

        .btn-7 {
            background-color: rgb(255, 179, 179);
            border: none;
            padding: 10px 20px;
            border-radius: 300000px 300000px 1px 0px;

            box-shadow: 2px 2px 2px grey;
        }

        .btn-7:hover {
            background-color: rgb(150, 230, 100);
        }

        .btn-8 {
            background-color: rgb(255, 179, 179);
            border: none;
            padding: 10px 20px;
            border-radius: 300px 150px 200px 4000px;

        }

             background-color: #4CAF50;

              width: 80px;
            height: 80px;
            border-radius: 60px 60px;
            padding: 0;
            cursor: pointer;
            box-shadow: 6px 6px 5px red ;
        }

        .btn-9:hover {
            background-color: rgb(150, 230, 100);
        }
    </style>
</head>

<body><button class="btn-1">Click Me</button>
    <button class="btn-2">Click Me</button>

 <button class="btn-5">Click Me</button>
